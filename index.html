<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>数学ミニ試験（移転しました）</title>
  <style>
    body { margin: 0; display: grid; place-items: center; min-height: 100vh; background: #faf9f6; color: #141413; font-family: "Segoe UI", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif; }
    .card { max-width: 560px; padding: 32px; border: 1px solid #141413; text-align: center; }
    a { color: #b5532e; font-weight: 700; }
  </style>
  <script>
    // 数学ミニ試験は math-practice（数学演習）へ統合されました。
    // 生徒別共有URLのパラメータ（s / t）と回の指定（exam）をそのまま引き継いで転送する。
    (() => {
      const params = new URLSearchParams(window.location.search);
      if (!params.get("exam")) params.set("exam", "mini_01");
      const target = "https://shtomi-tech.github.io/teikyo-math-practice/?" + params.toString();
      document.addEventListener("DOMContentLoaded", () => {
        const link = document.getElementById("targetLink");
        link.href = target;
      });
      window.location.replace(target);
    })();
  </script>
</head>
<body>
  <div class="card">
    <h1>数学ミニ試験は移転しました</h1>
    <p>「数学演習」アプリに統合されました。自動的に移動しない場合は、次のリンクを開いてください。</p>
    <p><a id="targetLink" href="https://shtomi-tech.github.io/teikyo-math-practice/?exam=mini_01">数学演習（統合版）を開く</a></p>
  </div>
</body>
</html>
